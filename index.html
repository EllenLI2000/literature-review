"Rethinking Lived Experience in Chronic Illness: Navigating Bodily Doubt with Consumer Technology in Atrial Fibrillation Self-Care","2025","CHI","Keys, Rachel; Marshall, Paul; Stuart, Graham; O'Kane, Aisling Ann","Qual","Global","(0, 3 hours]","Atrial Fibrillation","patients","Single time point × Past","Consumer technology is increasingly used to support the self-care of atrial fibrillation (AF), a chronic heart condition that affects physical, emotional, and mental health due to its unpredictability, symptoms, and complications. Through interviews with 29 adults self-tracking while living with AF, we found that consumer technology enabled participants to outsource bodily awareness to their ’digitised heart,’ facilitating innovative pill-in-pocket interventions and empowering negotiation in shared decision-making. Drawing on phenomenology, we introduce ’Bodily Doubt’ to explain how uncertainty about the body shapes the use of technology in chronic illness and how the use of technology influences uncertainty. Technology mediates ’Bodily Doubt’ both by providing reassurance and exacerbating it, particularly when technology fails to adapt to disease progression. Our findings have implications for understanding how technology influences the lived experience of illness, challenging experiential concepts of lived experience in self-tracking and design that foregrounds the experience of the lived body.","https://doi.org/10.1145/3706598.3713326"
"Rethinking Technological Solutions for Community-Based Older Adult Care: Insights from \`Older Partners' in China","2025","CSCW","Sun, Yuling; Ankenbauer, Sam Addison; Guo, Zhifan; Chen, Yuchen; Ma, Xiaojuan; He, Liang","Qual","China","(1 year, +∞)","aging related","others","Repeated measures × Present; Single time point × Past","Aging in place refers to the enabling of individuals to age comfortably and securely within their own homes and communities. Aging in place relies on robust infrastructure, prompting the development and implementation of both human-led care services and information and communication technologies to provide support. Through a long-term ethnographic study that includes semi-structured interviews with 24 stakeholders, we consider these human- and technology-driven care infrastructures for aging in place, examining their origins, deployment, interactions with older adults, and challenges. In doing so, we reconsider the value of these different forms of older adult care, highlighting the various issues associated with using, for instance, health monitoring technology or appointment scheduling systems to care for older adults aging in place. We suggest that technology should take a supportive, not substitutive role in older adult care infrastructure. Furthermore, we note that designing for aging in place should move beyond a narrow focus on independence in one's home to instead encompass the broader community and its dynamics.","https://doi.org/10.1145/3711058"
"Seasonal, weekly, and individual variations in long-term use of wearable medical devices for diabetes management","2025","Sci Rep","Cui, Y.; Stanger, C.; Prioleau, T.","Mixed","N.M.","(1 year, +∞)","T1 Disbetes","patients","Repeated measures × Present; Single time point × Past","Wearable medical-grade devices are transforming the standard of care for prevalent chronic conditions like diabetes. Yet, adoption and long-term use remain a challenge for many people. In this study, we investigate patterns of consistent versus disrupted use of continuous glucose monitors (CGMs) through analysis of more than 118,000 days of data, with over 22 million blood glucose samples, from 108 young adults with type 1 diabetes (average: 3 years of CGM data per person). In this population, we found more consistent CGM use at the start and end of the year (e.g., January, December), and more disrupted CGM use in the middle of the year/warmer months (i.e., May to July). We also found more consistent CGM use on weekdays (Monday to Thursday) and during waking hours (6AM - 6PM), but more disrupted CGM use on weekends (Friday to Sunday) and during evening/night hours (7PM - 5AM). Only 52.7% of participants (57 out of 108) had consistent and sustained CGM use over the years (i.e., over 70% daily wear time for more than 70% of their data duration). From semi-structured interviews, we unpack factors contributing to sustained CGM use (e.g., easier and better blood glucose management) and factors contributing to disrupted CGM use (e.g., changes in insurance coverage, issues with sensor adhesiveness/lifespan, and college/life transitions). We leverage insights from this study to elicit implications for next-generation technology and interventions that can circumvent seasonal and other factors that disrupt sustained use of wearable medical devices for the goal of improving health outcomes. © 2025 Elsevier B.V., All rights reserved.","https://www.scopus.com/inward/record.uri?eid=2-s2.0-105003123757&doi=10.1038%2Fs41598-025-98276-6&partnerID=40&md5=74db985edbfe22292b04932355aaed77"
"Seekers, Providers, Welcomers, and Storytellers: Modeling Social Roles in Online Health Communities","2019","CHI","Yang, Diyi; Kraut, Robert E.; Smith, Tenbroeck; Mayfield, Elijah; Jurafsky, Dan","Qual","U.S.","(0, 3 hours]","Cancer survivor","others","Repeated measures × Past","Participants in online communities often enact different roles when participating in their communities. For example, some in cancer support communities specialize in providing disease-related information or socializing new members. This work clusters the behavioral patterns of users of a cancer support community into specific functional roles. Based on a series of quantitative and qualitative evaluations, this research identified eleven roles that members occupy, such as welcomer and story sharer. We investigated role dynamics, including how roles change over members' lifecycles, and how roles predict long-term participation in the community. We found that members frequently change roles over their history, from ones that seek resources to ones offering help, while the distribution of roles is stable over the community's history. Adopting certain roles early on predicts members' continued participation in the community. Our methodology will be useful for facilitating better use of members' skills and interests in support of community-building efforts.","https://doi.org/10.1145/3290605.3300574"
"Self-tracking in Parkinson's The Lived Efforts of Self-management","2021","CSCW","Vafeiadou, Jenny; Vasalou, Asimina; Roussos, George","Qual","Global","(0, 3 hours]","Parkinson's Disease","others","Single time point × Past","People living with Parkinson's disease engage in self-tracking as part of their health self-management. Whilst health technologies designed for this group have primarily focused on improving the clinical assessments of the disease, less attention has been given to how people with Parkinson's use technology to track and manage their disease in their everyday experience. We report on a qualitative study in which we systematically analysed posts from an online health community (OHC) comprising people with Parkinson's (PwP). Our findings show that PwP track a diversity of information and use a wide range of digital and non-digital tools, informed by temporal and structured practices. Using an existing framework of sensemaking for chronic disease self-management, we also identify new ways in which PwP engage in sensemaking, alongside a set of new challenges that are particular to the character of this chronic disease. We relate our findings to technologies for self-tracking offering design implications.","https://doi.org/10.1145/3449158"
"Supporting Collaborative Reflection on Personal Values and Health","2021","CSCW","Berry, Andrew B.L.; Lim, Catherine Y.; Liang, Calvin A.; Hartzler, Andrea L.; Hirsch, Tad; Ferguson, Dawn M.; Bermet, Zoë A.; Ralston, James D.","Qual","U.S.","(0, 3 hours]","People with multiple chronic conditions (MCC)","patients","Single time point × Present","People with multiple chronic conditions (MCC) need support to understand and articulate how their personal values relate to their health and health care. We developed three prototypes for supporting reflection on values and health and tested them in a qualitative study involving 12 people with MCC. We identified benefits and limitations to building on how patients prepare for visits with clinicians; revealed varying levels of comfort with deep, exploratory reflection involving a facilitator; and found that reflection oriented toward the future could elicit hopeful attitudes and plans for change, while reflection on the past elicited strong resistance. We translated these findings into design guidelines for supporting collaborative reflection on values and health. We also discussed these findings in relation to previous literature on designing for reflection in three areas: shifting between self-guided and facilitator-guided reflection, balancing between outcome-oriented and exploratory reflection, and exploring temporality in reflection.","https://doi.org/10.1145/3476040"
"Taking our Time: Chronic Illness and Time-Based Objects in Families","2015","CSCW","Barbarin, Andrea; Veinot, Tiffany C.; Klasnja, Predrag","Qual","N.M.","(1 year, +∞)","People with chronic condition","patients+informal","Repeated measures × Past","This study examined the use of time-based objects by patients and their families to manage chronic illnesses at home. Calendar systems and medication containers, the main types of time-based objects studied, were used as part of two family-based collaborative work practices: 1) prompting health management activities, and 2) safeguarding these activities. Additionally, these artifacts were part of two social interaction patterns that managed emotional intimacy: 1) expressing support, and 2) hiding and disguising illness. Accordingly, home-based illness management may be more collaborative than previously recognized. Moreover, through their interactive incorporation into family life, time-based objects are laden with psychosocial significance. Breakdowns in temporal support were also evident, and were accompanied by: missed medication events; rationing of medications; medication errors; and difficulties with preparation for medical appointments. We propose novel artifact designs to better support patients and their families in managing the temporal aspects of chronic illness together.","https://doi.org/10.1145/2675133.2675200"
"The Multiplicative Patient and the Clinical Workflow: Clinician Perspectives on Social Interfaces for Self-Tracking and Managing Bipolar Disorder","2021","DIS","Hoefer, Michael Jeffrey Daniel; Van Kleunen, Lucy; Goodby, Cassandra; Blackburn, Lanea Blyss; Panati, Priyanka; Voida, Stephen","Qual","U.S.","(0, 3 hours]","Bipolar Disorder","formal caregivers","Single time point × Past","Personal health informatics are increasingly used in the long-term management of bipolar disorder and other serious mental illnesses. These systems help individuals and members of their support networks track and stabilize important social rhythms. In this study, we presented mental health professionals with nine design concepts for personal informatics systems to support interpersonal and social rhythm therapy. These designs, derived from prior empirical findings about patients’ data practices, utilize social interfaces to support the social ecologies critical to relational recovery in bipolar disorder. Designs included features for sharing data in dynamic social support systems, custom variables, commenting, co-tracking, and data-driven action plans. Qualitative analysis of clinicians’ feedback yielded design recommendations for mental health informatics, such as supporting all cognitive states of the multiplicative patient and the interactions between these states and patient–clinician interfaces. Diversity in clinical practice also necessitates application flexibility and careful integration with existing workflows.","https://doi.org/10.1145/3461778.3461995"
"Timeline drawing and the online scrapbook: Two visual elicitation techniques for a richer exploration of Illness Journeys","2018","International Journal of Qualitative Methods","Chen, A.T.","Qual","U.S.","Not sure","fibromyalgia","patients","Single time point × Past; Single time point × Present","This article explores the use of two visual methods to facilitate elicitation of temporal data in a qualitative interview study— specifically, a timeline drawing activity and collaborative viewing of an interface for visualizing personal social media histories, the Online Scrapbook—for eliciting participants’ recollections and reflections upon their experience of chronic illness. This study makes a novel contribution in the use of an interactive, data-driven timeline based on social media participation to elicit personal reflections. Both elicitation techniques were effective for encouraging participants to tell their story and take a closer look at their own experiences in their respective ways. Whereas the timeline drawing activity gave participants the opportunity to share their illness experiences from their own perspective, the Online Scrapbook facilitated a multidimensional exploration of how participants interacted with their surrounding online and offline environments, enabled participants to revisit their past through their own digital artifacts, and supported a deeper exploration of participants’ information behaviors. The article examines how the timeline drawing activity and the Online Scrapbook viewing activity were used together in the same study to bring out the richness and complexity of the relationship between information behavior and health management, and facilitate a nuanced view of participants’ lives. © 2021 Elsevier B.V., All rights reserved.","https://www.scopus.com/inward/record.uri?eid=2-s2.0-85045088173&doi=10.1177%2F1609406917753207&partnerID=40&md5=ce8b64c7cc117b4ef018a4fb931ae0db"
"Towards Hormone Health: An Autoethnography of Long-Term Holistic Tracking to Manage PCOS","2025","CHI","Kang, Daye; Li, Jingjin; Leshed, Gilly; Rzeszotarski, Jeffrey M; Lu, Xi","Qual","U.S.","(3 months, 1 year]","Polycystic Ovary Syndrome","others","Repeated measures × Present; Repeated measures × Past","Polycystic ovary syndrome (PCOS) is a common hormonal disorder affecting 11-13% of women of reproductive age, characterized by a wide range of symptoms (e.g., menstrual irregularity, acne, and obesity) that varies among individuals. While self-tracking tools help PCOS patients to monitor their symptoms and find personalized treatment, they often focus on regular periods of healthy women with inadequate support for the 1) personalization and 2) long-term holistic tracking necessary for managing complex chronic conditions like PCOS. To bridge this gap, the first author (who has PCOS) conducted an autoethnographic study of holistic self-tracking over a period of ten months in an effort to manage her condition. Our results highlight the challenges of personalized, holistic, long-term tracking in medical, socio-cultural, temporal, technical, and spatial contexts. Based on these insights, we provide design implications for tracking tools that are more inclusive and sustainable.","https://doi.org/10.1145/3706598.3713619"
"Transitioning Toward Independence: Enhancing Collaborative Self-Management of Children with Type 1 Diabetes","2022","CHI","Cha, Yoon Jeong; Saxena, Arpita; Wou, Alice; Lee, Joyce; Newman, Mark W; Park, Sun Young","Qual","N.M.","(0, 3 hours]","T1 Disbetes","patients+informal","Single time point × Past","Although child participation is required for successful Type 1 Diabetes (T1D) management, it is challenging because the child’s young age and immaturity make it difficult to perform self-care. Thus, parental caregivers are expected to be heavily involved in their child’s everyday illness management. Our study aims to investigate how children and parents collaborate to manage T1D and examine how the children become more independent in their self-management through the support of their parents. Through semi-structured interviews with children with T1D and their parents (N=41), our study showed that children’s knowledge of illness management and motivation for self-care were crucial for their transition towards independence. Based on these two factors, we identified four types of children’s collaboration (i.e., dependent, resistant, eager, and independent) and parents’ strategies for supporting their children’s independence. We suggest design implications for technologies to support collaborative care by improving children’s transition to independent illness management.","https://doi.org/10.1145/3491102.3502055"
"Understanding the Mundane Nature of Self-care: Ethnographic Accounts of People Living with Parkinson's","2018","CHI","Nunes, Francisco; Fitzpatrick, Geraldine","Qual","N.M.","(0, 3 hours]","Parkinson's Disease","patients+informal","Single time point × Past","Self-care technologies have been influenced by medical values and models. One of the values that was acritically incorporated was that self-care was medicalised, and, as a result, technologies were designed to afford use with clinicians and fit structured medical processes. This paper seeks to broaden the understanding of self-care in HCI, to acknowledge the mundane ways in which self-care is achieved. Drawing on in-depth interviews with patients and carers, and online ethnography of an online community, we describe how the self-care of Parkinson's is mundane. The fieldwork contrasts with more medicalised perspectives on self-care, thus we discuss the properties of a self-care concept that would acknowledge its mundane nature. Our hope is to sensitise designers to identify the mundane ways in which self-care is performed and, consequently, design technologies that better fit the complexities of everyday life with a chronic condition.","https://doi.org/10.1145/3173574.3173976"
"Understanding the sustained use of online health communities from a self-determination perspective","2016","ASIS&T","Zhang, Y.","Qual","N.M.","(0, 3 hours]","People with chronic condition","patients+informal","","Sustained use of an information source is sometimes important for achieving an individual's long-term goals, such as learning and self-development. It is even more important for users of online health communities because health benefits usually come with sustained use. However, little is known about what retains a user. We interviewed 21 participants who had been using online diabetes communities in a sustained manner. Guided by self-determination theory, which posits that behaviors are sustained when they can satisfy basic human needs for autonomy, competence, and relatedness, we identified mechanisms that help satisfy these needs, and thus sustain users in online health communities. Autonomy-supportive mechanisms include being respected and supported as a unique individual, feeling free in making choices, and receiving meaningful rationales about others' decisions. Competence-cultivating mechanisms include seeking information, providing information, and exchanging information with others to construct knowledge. Mechanisms that cultivate relatedness include seeing similarities between oneself and peers, receiving responses from others, providing emotional support, and forming small underground groups for closer interactions. The results suggest that, like emotions, information and small group interactions also play a key role in retaining users. System design and community management strategies are discussed based on these mechanisms. © 2018 Elsevier B.V., All rights reserved.","https://www.scopus.com/inward/record.uri?eid=2-s2.0-84995538874&doi=10.1002%2Fasi.23560&partnerID=40&md5=7b22100904e5a2fcd365f5c6c35991e9"
"Understanding the Temporality of Informal Caregivers' Sense-Making on Conflicts and Life-Changing Events through Online Health Communities","2025","CSCW","Xu, Kefan; Baseman, Cynthia M.; Swinger, Nathaniel; Ryu, Myeonghan; Arriaga, Rosa I.","Qual","Global","(0, 3 hours]","People with chronic condition","others","","Informal caregivers perform an important role in taking care of family members with chronic disease. Informal caregivers' mental health can be negatively impacted by life-changing events (e.g., patients' diagnosis, care transitioning, etc.). This leads the caregiver to suffer from interpersonal and intrapersonal conflicts, causing a sense of disorientation and escalating malaise. In this study, we investigated informal caregivers' experiences of facing conflicts and life-changing events by qualitatively analyzing the data from online health communities. We categorized conflicts using a psychodynamic framework. We further looked at the interplay of life-changing events and conflicts and how this leads to caregivers' sense-making and decisions to mediate conflicts. We also found that online health communities provide support by helping caregivers interpret and navigate conflicts and raising awareness of the temporal resolution of life-changing events. We conclude this study by discussing designing online health communities to better support such practice.","https://doi.org/10.1145/3757519"
"VIDDE: Visualizations for Helping People with COPD Interpret Dyspnea During Exercise","2021","ASSETS '21","Chen, Claudia; Wu, Robert; Khan, Hashim; Truong, Khai; Chevalier, Fanny","Mixed","Canada","(0, 3 hours]","Chronic Obstructive Pulmonary Disease","patients","Single time point × Past; Repeated measures × Present","People with chronic obstructive pulmonary disease (COPD) experience dyspnea and dyspnea-related distress and anxiety (DDA) upon physical exertion. When performing supervised exercise, measurement of physiological data, such as heart rate (HR) and blood oxygen saturation (O2sat), are commonly used for safety, but the impacts of such monitoring on their perceptions and behaviour have not previously been studied. This paper investigates the effect of presenting live physiological data to people with COPD during exercise with a focus on its impact on perceptions of dyspnea intensity (DI) and DDA. Informed by formative interviews with 15 people with COPD, we design VIDDE, an exercise companion tool visualizing live data from a pulse oximeter, and evaluate its effect on DI and DDA through case studies involving 3 participants with COPD exercising at their homes. We also conducted design probe interviews with 6 more participants with COPD to investigate their needs and design requirements for an exercise-companion application that featured physiological data monitoring. Our results suggest that presenting live physiological data during exercise is of value, and can contribute to reduced DDA, better understanding of breathlessness sensations, while providing sufficient reassurance to encourage physical activity.","https://doi.org/10.1145/3441852.3471204"
"Visual ODLs: Co-Designing Patient-Generated Observations of Daily Living to Support Data-Driven Conversations in Pediatric Care","2018","CHI","Hong, Matthew K.; Lakshmi, Udaya; Olson, Thomas A.; Wilcox, Lauren","Qual","U.S.","(0, 3 hours]","People with chronic condition","patients+formal+informal","Single time point × Present; Single time point × Past; Single time point × Future","Teens with complex chronic illnesses have difficulty understanding and articulating symptoms such as pain and emotional distress. Yet, symptom communication plays a central role in clinical care and illness management. To understand how design can help overcome these challenges, we created a visual library of 72 sketched illustrations, informed by the Observations of Daily Living framework along with insights from 11 clinician interviews. We utilized our library with storyboarding techniques, free-form sketching, and interviews, in co-design sessions with 13 pairs of chronically-ill teens and their parents. We found that teens depicted symptoms as being interwoven with narratives of personal and social identity. Teens and parents were enthusiastic about collaboratively-generated, interactive storyboards as a tracking and communication mechanism, and suggested three ways in which they could aid in communication and coordination with informal and formal caregivers. In this paper, we detail these findings, to guide the design of tools for symptom-tracking and incorporation of patient-generated data into pediatric care.","https://doi.org/10.1145/3173574.3174050"
"VR Reminiscence as “Care” in a Psychiatric Hospital","2025","International Journal of Asia Digital Art and Design","Minamii, M.; Daewoong, K.; Suguru, H.","Mixed","Japan","(0, 3 hours]","Psychiatric","patients","Two time points × Past","This study explores the use of virtual reality reminiscence therapy (VR-RT) as a “care” tool in a psychiatric hospital setting, focusing on its potential to foster meaningful interactions between patients and nurses. While VR-RT has been shown to improve psychological well-being and cognitive function in older adults, this study examines its application through the lens of the phenomenology of care. Seven participants, hospitalized in chronic care wards for conditions such as schizophrenia and depression, engaged in a VR experience alongside their assigned nurses. Participants revisited significant locations and life events through immersive 360-degree films, tailored to their memories and desires. The analysis revealed that VR-RT facilitates conversations that reflect key elements of Benner's phenomenological framework: temporality, care/concern, background meaning, situation, and embodied intelligence. Patients shared narratives about their pasts, current experiences, and aspirations for the future, deepening their connection with the nurses. The study employed qualitative methods, including semi-structured interviews, to evaluate the effectiveness and limitations of VR as a therapeutic medium. While VR sickness was minimal, the results highlight the importance of careful monitoring and short usage durations to ensure safety. This research contributes to the growing field of digital therapeutics by demonstrating the value of VR-RT not only as a tool for symptom management but also as a means to enhance patient-centered care. Future studies should expand sample sizes and integrate mixed-method approaches to explore the broader implications of VR technology in mental health care. © 2025 Elsevier B.V., All rights reserved.","https://doi.org/10.20668/adada.29.3_80"
"When Worlds Collide: Boundary Management of Adolescent and Young Adult Childhood Cancer Survivors and Caregivers","2022","CHI","A. Ankrah, Elizabeth; Bhattacharya, Arpita; Donjuan, Lissamarie; L. Cibrian, Franceli; Torno, Lilibeth; Ritt Olson, Anamara; Milam, Joel; Hayes, Gillian","Qual","U.S.","(0, 3 hours]","Cancer survivor","patients+informal","Single time point × Past","Adolescent and young adult childhood cancer survivors experience health complications, late or long-term biomedical complications, as well as economic and psychosocial challenges that can have a lifelong impact on their quality-of-life. As childhood cancer survivors transition into adulthood, they must learn to balance their identity development with demands of everyday life and the near- and long-term consequences of their cancer experience, all of which have implications for the ways they use existing technologies and the design of novel technologies. In this study, we interviewed 24 childhood cancer survivors and six caregivers about their cancer survivorship experiences. The results of our analysis indicate that the challenges of transitioning to adulthood as a cancer survivor necessitate the development and management of multiple societal, relational, and personal boundaries, processes that social computing technologies can help or hinder. This paper contributes to the empirical understanding of adolescent and young adult cancer survivors’ social experiences. We further contribute sociotechnical design provocations for researchers, designers, and community members to support survivors.","https://doi.org/10.1145/3491102.3517544"

// ═══════════════════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════════
const TABLE_COLS_MAX = 8;
const FILTER_COL_KEYWORDS = ["year", "venue", "research methods", "target group", "study location", "chronic disease"];
const TEMPORAL_COL_KEY = "temporal data types";  // matched case-insensitively
const TEMPORAL_SEP = "×";                          // separator between frequency and orientation

const THEMES_CONFIG = {
  "mHealth Adoption":          { color: "#3b82f6", description: "Studies examining how users adopt, engage with, and disengage from mobile health technologies over time." },
  "Privacy & Trust":           { color: "#8b5cf6", description: "Research on user privacy perceptions, data security concerns, and trust formation in digital health systems." },
  "Inclusive Design":          { color: "#10b981", description: "Work addressing accessibility, usability for diverse populations, and reducing digital health disparities." },
  "Persuasive Technology":     { color: "#f59e0b", description: "Studies applying persuasive design patterns — gamification, nudges, social comparison — to promote health behavior change." },
  "Clinical Decision Support": { color: "#ef4444", description: "Research on AI/algorithm-based tools that assist clinicians with diagnosis, treatment, and workflow decisions." },
  "Health Equity":             { color: "#14b8a6", description: "Studies investigating disparities in digital health access, usage, and outcomes across demographic groups." },
  "Conversational AI":         { color: "#f97316", description: "Work on chatbots, voice assistants, and conversational agents applied to health coaching, adherence, or triage." },
  "Self-Management":           { color: "#06b6d4", description: "Research supporting patients in managing chronic conditions through tracking, feedback, and goal-setting tools." }
};

const AUTO_COLORS = ["#6366f1","#ec4899","#84cc16","#f43f5e","#a855f7","#0ea5e9","#22c55e","#eab308"];
const autoColorMap = {};

// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
let allData = [], columns = [], tableCols = [];
let themesColName = null, doiColName = null, temporalColName = null;
let sortCol = null, sortDir = 1;
let activeFilters = {}, activeThemeFilter = "";
let activeFreqFilter = "", activeOrientFilter = "";
let expandedRows = new Set();

// ═══════════════════════════════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("last-updated").textContent =
    new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
  loadCSV(SAMPLE_CSV);
  document.getElementById("search-input").addEventListener("input", render);
  document.getElementById("reset-btn").addEventListener("click", resetFilters);
  document.getElementById("csv-file-input").addEventListener("change", handleFileUpload);
  initTooltip();
});

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadCSV(ev.target.result);
  reader.readAsText(file);
  document.querySelector("header h1").innerHTML =
    esc(file.name.replace(/\.csv$/i, "").replace(/[-_]/g, " ")) + " <span>Review</span>";
}

function loadCSV(csvText) {
  const result = Papa.parse(csvText.trim(), { header: true, skipEmptyLines: true });
  columns = result.meta.fields || [];
  allData = result.data;
  expandedRows.clear();
  activeFilters = {};
  activeThemeFilter = "";

  themesColName   = columns.find(c => c.toLowerCase() === "themes") || null;
  doiColName      = columns.find(c => /^(doi|url|link)$/i.test(c.trim())) || null;
  temporalColName = columns.find(c => c.toLowerCase() === TEMPORAL_COL_KEY) || null;

  // All special columns are excluded from the main table header
  const special = new Set(["abstract", themesColName, doiColName].filter(Boolean).map(c => c.toLowerCase()));
  tableCols = columns.filter(c => !special.has(c.toLowerCase())).slice(0, TABLE_COLS_MAX);

  buildFilterSelects();
  render();
}

// ═══════════════════════════════════════════════════════════════════════════════
// FILTER SELECTS
// ═══════════════════════════════════════════════════════════════════════════════
function buildFilterSelects() {
  const container = document.getElementById("filter-selects");
  container.innerHTML = "";
  activeFilters = {};
  activeFreqFilter = "";
  activeOrientFilter = "";

  columns.forEach(col => {
    if (col === themesColName || col === doiColName) return;
    if (!FILTER_COL_KEYWORDS.some(k => col.toLowerCase().includes(k))) return;
    const values = [...new Set(allData.map(r => r[col]).filter(Boolean))].sort();
    if (values.length < 2 || values.length > 30) return;
    activeFilters[col] = "";
    const sel = document.createElement("select");
    sel.className = "filter-select";
    sel.dataset.col = col;
    sel.innerHTML = `<option value="">All ${esc(col)}</option>` +
      values.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
    sel.addEventListener("change", () => { activeFilters[col] = sel.value; render(); });
    container.appendChild(sel);
  });

  if (themesColName) {
    const allThemes = new Set();
    allData.forEach(r => splitBy(r[themesColName], ";").forEach(t => allThemes.add(t)));
    const list = [...allThemes].sort();
    if (list.length > 1) {
      const sel = document.createElement("select");
      sel.className = "filter-select";
      sel.id = "theme-filter-select";
      sel.innerHTML = `<option value="">All Themes</option>` +
        list.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
      sel.addEventListener("change", () => { activeThemeFilter = sel.value; render(); });
      container.appendChild(sel);
    }
  }

  if (temporalColName) {
    const freqs = new Set(), orients = new Set();
    allData.forEach(r => {
      splitBy(r[temporalColName], ";").forEach(entry => {
        const parts = entry.split(TEMPORAL_SEP).map(s => s.trim());
        if (parts[0]) freqs.add(parts[0]);
        if (parts[1]) orients.add(parts[1]);
      });
    });

    if (freqs.size > 1) {
      const sel = document.createElement("select");
      sel.className = "filter-select";
      sel.id = "freq-filter-select";
      sel.innerHTML = `<option value="">All Collection Frequencies</option>` +
        [...freqs].sort().map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
      sel.addEventListener("change", () => { activeFreqFilter = sel.value; render(); });
      container.appendChild(sel);
    }

    if (orients.size > 1) {
      const sel = document.createElement("select");
      sel.className = "filter-select";
      sel.id = "orient-filter-select";
      sel.innerHTML = `<option value="">All Temporal Orientations</option>` +
        [...orients].sort().map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
      sel.addEventListener("change", () => { activeOrientFilter = sel.value; render(); });
      container.appendChild(sel);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════════
function render() {
  const query = document.getElementById("search-input").value.toLowerCase().trim();
  let rows = allData.filter(row => {
    if (query && !columns.some(c => (row[c] || "").toLowerCase().includes(query))) return false;
    for (const [col, val] of Object.entries(activeFilters)) {
      if (val && row[col] !== val) return false;
    }
    if (activeThemeFilter && themesColName) {
      if (!splitBy(row[themesColName], ";").includes(activeThemeFilter)) return false;
    }
    if ((activeFreqFilter || activeOrientFilter) && temporalColName) {
      const entries = splitBy(row[temporalColName], ";").map(e => {
        const parts = e.split(TEMPORAL_SEP).map(s => s.trim());
        return { freq: parts[0] || "", orient: parts[1] || "" };
      });
      const match = entries.some(e =>
        (!activeFreqFilter   || e.freq   === activeFreqFilter) &&
        (!activeOrientFilter || e.orient === activeOrientFilter)
      );
      if (!match) return false;
    }
    return true;
  });

  if (sortCol) {
    rows = [...rows].sort((a, b) => {
      const av = a[sortCol] || "", bv = b[sortCol] || "";
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return av.localeCompare(bv) * sortDir;
    });
  }

  renderHead();
  renderBody(rows);

  const count = rows.length;
  document.getElementById("paper-count").textContent = `${count} paper${count !== 1 ? "s" : ""}`;
  document.getElementById("empty-state").style.display = count === 0 ? "block" : "none";
  document.getElementById("lit-table").style.display = count === 0 ? "none" : "";
}

function renderHead() {
  const tr = document.getElementById("table-head");
  const colWidth = col => {
    const c = col.toLowerCase();
    if (c.includes("title"))    return "22%";
    if (c.includes("year"))     return "56px";
    if (c.includes("venue"))    return "80px";
    if (c.includes("author"))   return "120px";
    if (c.includes("research methods")) return "80px";
    if (c.includes("study location"))   return "100px";
    if (c.includes("study duration"))   return "130px";
    if (c.includes("chronic disease"))  return "130px";
    return "110px";
  };
  tr.innerHTML = tableCols.map(col => {
    const sorted = sortCol === col;
    const icon = sorted ? (sortDir === 1 ? "↑" : "↓") : "↕";
    return `<th class="${sorted ? "sorted" : ""}" data-col="${esc(col)}" style="width:${colWidth(col)}">${esc(col)} <i class="sort-icon">${icon}</i></th>`;
  }).join("") + (themesColName ? `<th class="themes-th" style="width:180px">Themes</th>` : "");

  tr.querySelectorAll("th:not(.themes-th)").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      sortCol === col ? sortDir *= -1 : (sortCol = col, sortDir = 1);
      render();
    });
  });
}

function renderBody(rows) {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  const totalCols = tableCols.length + (themesColName ? 1 : 0);

  rows.forEach((row, idx) => {
    const isExpanded = expandedRows.has(idx);
    const tr = document.createElement("tr");
    tr.className = "main-row" + (isExpanded ? " expanded" : "");

    const doi = doiColName ? (row[doiColName] || "") : "";
    const doiBtn = doi
      ? `<a class="doi-link" href="${esc(doi)}" target="_blank" rel="noopener" title="Open DOI" onclick="event.stopPropagation()">
           <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
         </a>`
      : "";

    let html = tableCols.map((col, ci) => {
      const val = row[col] || "—";
      if (ci === 0) return `<td class="td-title"><span class="expand-icon">▶</span>${esc(val)}${doiBtn}</td>`;
      if (col.toLowerCase().includes("year")) return `<td><span class="year-badge">${esc(val)}</span></td>`;
      if (col.toLowerCase().includes("study type")) return `<td><span class="tag">${esc(val)}</span></td>`;
      return `<td><span class="td-truncate" title="${esc(val)}">${esc(val)}</span></td>`;
    }).join("");

    if (themesColName) {
      html += `<td class="td-themes"><div class="themes-wrap">${renderThemeTags(row[themesColName] || "")}</div></td>`;
    }

    tr.innerHTML = html;
    tr.addEventListener("click", e => {
      if (e.target.closest(".theme-tag") || e.target.closest(".doi-link")) return;
      toggleRow(idx, row, tr, tbody, totalCols);
    });
    tbody.appendChild(tr);
    if (isExpanded) tbody.appendChild(buildDetailRow(row, totalCols));
  });
}

function toggleRow(idx, row, tr, tbody, totalCols) {
  if (expandedRows.has(idx)) {
    expandedRows.delete(idx);
    tr.classList.remove("expanded");
    const next = tr.nextSibling;
    if (next?.classList?.contains("detail-row")) next.remove();
  } else {
    expandedRows.add(idx);
    tr.classList.add("expanded");
    tr.insertAdjacentElement("afterend", buildDetailRow(row, totalCols));
  }
}

function buildDetailRow(row, totalCols) {
  const tr = document.createElement("tr");
  tr.className = "detail-row";

  // All columns not already shown in the table header
  const skipSet = new Set([...tableCols, "abstract", "Abstract", themesColName, doiColName].filter(Boolean));
  const detailCols = columns.filter(c => !skipSet.has(c));

  const abstract = row["Abstract"] || row["abstract"] || "";
  const doi = doiColName ? (row[doiColName] || "") : "";
  const themes = themesColName ? splitBy(row[themesColName], ";") : [];

  let html = `<td colspan="${totalCols}"><div class="detail-inner">`;

  if (doi) {
    html += `<div class="full-span"><h4>DOI / Link</h4><a href="${esc(doi)}" target="_blank" rel="noopener">${esc(doi)}</a></div>`;
  }

  if (abstract) {
    html += `<div class="full-span"><h4>Abstract</h4><p>${esc(abstract)}</p></div>`;
  }

  if (themes.length > 0) {
    html += `<div class="full-span"><h4>Themes</h4><div class="themes-detail-list">`;
    themes.forEach(t => {
      const cfg = getThemeConfig(t);
      html += `<div class="themes-detail-item">
        <span class="theme-tag" style="background:${cfg.color}22;color:${cfg.color};border-color:${cfg.color}55;">${esc(t)}</span>
        <p>${esc(cfg.description || "No description defined.")}</p>
      </div>`;
    });
    html += `</div></div>`;
  }

  detailCols.forEach(col => {
    html += `<dl class="detail-field"><dt>${esc(col)}</dt><dd>${esc(row[col] || "—")}</dd></dl>`;
  });

  html += `</div></td>`;
  tr.innerHTML = html;
  return tr;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════════════════════
function initTooltip() {
  const tip = document.getElementById("floating-tooltip");
  document.addEventListener("mouseover", e => {
    const tag = e.target.closest(".theme-tag[data-theme]");
    if (!tag) return;
    const cfg = getThemeConfig(tag.dataset.theme);
    if (!cfg.description) return;
    tip.querySelector("strong").textContent = tag.dataset.theme;
    tip.querySelector("span").textContent = cfg.description;
    tip.classList.add("visible");
    const rect = tag.getBoundingClientRect();
    let left = rect.left, top = rect.bottom + 8;
    if (left + 280 > window.innerWidth - 16) left = window.innerWidth - 296;
    if (top + 80 > window.innerHeight - 16) top = rect.top - 88;
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  });
  document.addEventListener("mouseout", e => {
    if (e.target.closest(".theme-tag[data-theme]")) tip.classList.remove("visible");
  });
  document.addEventListener("scroll", () => tip.classList.remove("visible"), true);
}

// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function resetFilters() {
  document.getElementById("search-input").value = "";
  document.querySelectorAll(".filter-select").forEach(s => {
    s.value = "";
    if (s.id === "theme-filter-select")  activeThemeFilter  = "";
    else if (s.id === "freq-filter-select")   activeFreqFilter   = "";
    else if (s.id === "orient-filter-select") activeOrientFilter = "";
    else activeFilters[s.dataset.col] = "";
  });
  sortCol = null;
  expandedRows.clear();
  render();
}

function renderThemeTags(str) {
  return splitBy(str, ";").map(t => {
    const cfg = getThemeConfig(t);
    return `<span class="theme-tag" style="background:${cfg.color}22;color:${cfg.color};border-color:${cfg.color}55;" data-theme="${esc(t)}">${esc(t)}</span>`;
  }).join("");
}

function getThemeConfig(name) {
  if (THEMES_CONFIG[name]) return THEMES_CONFIG[name];
  if (!autoColorMap[name]) {
    autoColorMap[name] = { color: AUTO_COLORS[Object.keys(autoColorMap).length % AUTO_COLORS.length], description: "" };
  }
  return autoColorMap[name];
}

function splitBy(str, sep) {
  if (!str) return [];
  return str.split(sep).map(s => s.trim()).filter(Boolean);
}

function esc(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
